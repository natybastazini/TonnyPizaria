<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="../dist/output.css" rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Lobster&family=Inter:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Tonny Pizzaria</title>
  </head>
  <body class="flex">
    <div
      class="h-screen w-[46%] bg-linear-to-b from-orange-1 to-gradient-red flex rounded-br-4xl rounded-tr-4xl"
    >
      <div
        class="h-full w-full flex flex-row gap-12 justify-center items-center"
      >
        <img
          class="w-28 h-32"
          src="../img/pizza_marca_logo.png"
          alt="pizza-logo"
        />
        <h1 class="text-5xl text-white font-lobster leading-none">
          Tonny <br />
          Pizzaria
        </h1>
      </div>
    </div>
    <main
      class="h-screen w-full bg-white flex flex-col justify-center items-center"
    >
      <div class="h-1/3 w-3/6 flex flex-col justify-end items-start gap-8">
        <div class="flex flex-col font-inter text-gray-1">
          <h2 class="text-4xl font-light">Crie sua conta</h2>
          <div class="flex flex-row gap-1.5">
            <p class="font-extralight">Já possuí conta?</p>
            <a class="font-light underline decoration-1" href="login.html"
              >Clique aqui</a
            >
          </div>
        </div>
      </div>
      <div class="h-full w-3/6 flex items-center">
        <form class="flex flex-col gap-4 h-4/5 w-full" action="">
          <label for="nome"></label>
          <div
            class="flex flex-row justify-center items-center bg-white border-2 border-gray-2 w-sm h-10 rounded-3xl gap-2"
          >
            <img class="size-4" src="../img/nome_logo.png" alt="nome" />
            <input
              class="h-30px w-4/5 outline-none"
              required
              placeholder="Nome"
              type="text"
              name="nome"
              id="nome"
            />
          </div>
          <label for="data"></label>
          <div
            class="flex flex-row justify-center items-center bg-white border-2 border-gray-2 w-sm h-10 rounded-3xl gap-2"
          >
            <img
              class="size-4"
              src="../img/data_nascimento_logo.png"
              alt="data aniverário"
            />
            <input
              class="h-30px w-4/5 outline-none text-gray-1 [&::-webkit-calendar-picker-indicator]:opacity-40"
              required
              placeholder="Data aniverário"
              type="date"
              name="data"
              id="data"
            />
          </div>
          <label for="email"></label>
          <div
            class="flex flex-row justify-center items-center bg-white border-2 border-gray-2 w-sm h-10 rounded-3xl gap-2"
          >
            <img class="size-4" src="../img/email_logo.png" alt="email" />
            <input
              class="h-30px w-4/5 outline-none"
              required
              placeholder="E-mail"
              type="email"
              name="email"
              id="email"
            />
          </div>
          <label for="senha"></label>
          <div
            class="flex flex-row justify-center items-center bg-white border-2 border-gray-2 w-sm h-10 rounded-3xl gap-2"
          >
            <img class="size-4" src="../img/senha_logo.png" alt="senha" />
            <input
              class="h-30px w-4/5 outline-none"
              required
              placeholder="Senha"
              type="password"
              name="senha"
              id="senha"
            />
          </div>

          <div class="flex mt-auto pb-8 pl-2">
            <button
              class="flex justify-center items-center font-inter font-bold bg-green-1 text-white px-12 py-4 w-1/4 h-10 rounded-4xl transition hover:scale-105 duration-700 cursor-pointer"
            >
              <input type="submit" value="Criar" />
            </button>
          </div>
        </form>
      </div>
    </main>
  </body>
</html>
